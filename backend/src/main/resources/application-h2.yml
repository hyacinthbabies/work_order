server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/ticketdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: njbank-ticket-system-secret-key-2025
  expiration: 86400000

logging:
  level:
    com.njbank.ticket: DEBUG

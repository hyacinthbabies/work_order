server:
  port: 8080

spring:
  datasource:
    url: ${ORACLE_URL:jdbc:oracle:thin:@localhost:1521/ORCL}
    username: ${ORACLE_USERNAME:ticket_user}
    password: ${ORACLE_PASSWORD:ticket_password}
    driver-class-name: oracle.jdbc.OracleDriver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.Oracle12cDialect

jwt:
  secret: njbank-ticket-system-secret-key-2025
  expiration: 86400000

logging:
  level:
    com.njbank.ticket: DEBUG